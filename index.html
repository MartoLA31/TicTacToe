<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>Tic-Tac-Toe</h1>
    <div class="status" id="status">Player X turn</div>
    <div class="board" id="board" aria-label="Tic-Tac-Toe board"></div>
    <div class="controls">
      <button class="reset" id="reset">Reset</button>
    </div>
  </main>

  <script>
    const board = document.getElementById("board");
    const status = document.getElementById("status");
    const reset = document.getElementById("reset");

    const wins = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let cells = [];
    let state = Array(9).fill("");
    let turn = "X";
    let done = false;

    function setStatus(message, kind = "") {
      status.textContent = message;
      status.className = kind ? `status ${kind}` : "status";
    }

    function renderBoard() {
      board.innerHTML = "";
      cells = state.map((value, index) => {
        const btn = document.createElement("button");
        btn.className = "cell";
        btn.textContent = value;
        btn.setAttribute("aria-label", `Cell ${index + 1}`);
        if (value) btn.classList.add(value.toLowerCase());
        btn.addEventListener("click", () => play(index));
        board.appendChild(btn);
        return btn;
      });
    }

    function winner() {
      for (const [a, b, c] of wins) {
        if (state[a] && state[a] === state[b] && state[a] === state[c]) {
          return state[a];
        }
      }
      return "";
    }

    function play(i) {
      if (done || state[i]) return;

      state[i] = turn;
      const cell = cells[i];
      cell.textContent = turn;
      cell.classList.add(turn.toLowerCase());

      const win = winner();
      if (win) {
        setStatus(`Player ${win} wins!`, "win");
        done = true;
        return;
      }

      if (!state.includes("")) {
        setStatus("Draw!", "draw");
        done = true;
        return;
      }

      turn = turn === "X" ? "O" : "X";
      setStatus(`Player ${turn} turn`);
    }

    function restart() {
      state = Array(9).fill("");
      turn = "X";
      done = false;
      setStatus("Player X turn");
      renderBoard();
    }

    reset.addEventListener("click", restart);
    renderBoard();
  </script>
</body>
</html>
